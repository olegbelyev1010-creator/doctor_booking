<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#0d9488" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ДокторОнлайн — запись к врачу</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <button type="button" class="sidebar-close" id="sidebar-close" aria-label="Закрыть меню">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>

      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </div>
        <div>
          <h1>ДокторОнлайн</h1>
          <p>Онлайн-консультации</p>
        </div>
      </div>

      <div class="info-card">
        <h3>Как записаться</h3>
        <ol>
          <li>Назовите специальность или врача</li>
          <li>Выберите удобное время</li>
          <li>Укажите ФИО и телефон</li>
          <li>Получите подтверждение</li>
        </ol>
      </div>

      <div class="stats-card">
        <div class="stat">
          <span class="stat-value" id="doctor-count">—</span>
          <span class="stat-label">врачей в базе</span>
        </div>
        <div class="stat-dot" aria-hidden="true"></div>
        <div class="stat">
          <span class="stat-value">24/7</span>
          <span class="stat-label">онлайн-запись</span>
        </div>
      </div>

      <button type="button" id="reset-btn" class="btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        Новый диалог
      </button>
    </aside>

    <main class="chat-panel">
      <header class="chat-header">
        <button type="button" id="menu-btn" class="btn-icon menu-btn" aria-label="Открыть меню" aria-expanded="false" aria-controls="sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <div class="header-left">
          <div class="avatar" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </div>
          <div>
            <h2>Регистратура</h2>
            <span class="status" id="status">
              <span class="status-dot"></span>
              <span class="status-text">На линии</span>
            </span>
          </div>
        </div>
        <button type="button" id="reset-btn-mobile" class="btn-icon" title="Новый диалог" aria-label="Новый диалог">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </button>
      </header>

      <div class="chat-body">
        <div id="messages" class="messages" role="log" aria-live="polite"></div>

        <div class="quick-replies" id="quick-replies">
          <button type="button" class="chip" data-text="Запишите к терапевту">Терапевт</button>
          <button type="button" class="chip" data-text="Запишите к кардиологу">Кардиолог</button>
          <button type="button" class="chip" data-text="Запишите к дерматологу">Дерматолог</button>
          <button type="button" class="chip" data-text="Какие специальности есть?">Специальности</button>
        </div>
      </div>

      <footer class="chat-footer">
        <form id="chat-form" class="chat-input">
          <div class="input-wrap">
            <textarea
              id="user-input"
              rows="1"
              placeholder="Например: запишите к терапевту на завтра"
              autocomplete="off"
              required
            ></textarea>
          </div>
          <button type="submit" id="send-btn" aria-label="Отправить">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </form>
        <p class="input-hint" aria-hidden="true">Enter — отправить · Shift+Enter — новая строка</p>
      </footer>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
